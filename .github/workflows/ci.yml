name: ci

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, labeled, unlabeled]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests-touched:
    name: tests-touched
    # break-glass skips (skipped = green for the ruleset — the escape hatch).
    if: >-
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'break-glass')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Code changes must touch tests (label test-exempt to waive)
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          EXEMPT: ${{ contains(github.event.pull_request.labels.*.name, 'test-exempt') }}
        run: |
          changed="$(git diff --name-only "$BASE" "$HEAD")"
          echo "changed files:"; echo "$changed"
          # Product code only — tooling (.claude/, scripts/, .github/), docs,
          # and team memory are exempt by path.
          code="$(echo "$changed" | grep -Ev '^(docs/|data/context/|\.claude/|\.github/|scripts/)' | grep -E '\.(ts|tsx|js|jsx|mjs|cjs|py|go|rs|rb|java|kt|swift|vue|svelte)$' || true)"
          tests="$(echo "$changed" | grep -Ei '(^|/)(tests?|__tests__|spec)/|\.(test|spec)\.[a-z]+$|_test\.[a-z]+$' || true)"
          if [ -n "$code" ] && [ -z "$tests" ] && [ "$EXEMPT" != "true" ]; then
            echo "::error::code changed but no tests touched — add tests or apply the test-exempt label"
            exit 1
          fi
          echo "tests-touched: OK"

  build-test:
    name: build-test
    if: >-
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'break-glass')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build and test when a stack exists (no-op until stack stamped)
        run: |
          if [ ! -f package.json ]; then
            echo "no package.json — no stack yet, pass"
            exit 0
          fi
          npm ci || npm install
          npm run lint --if-present
          npm run typecheck --if-present
          npm run build --if-present
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm test
          else
            echo "no test script — pass"
          fi

  hooks-test:
    name: hooks-test
    # Proves the PreToolUse gates (bash-guard, fact-gate) actually deny. Hooks
    # fail open, so a silently-broken gate would otherwise pass unnoticed. Pure
    # node, no deps — always runs; informative (not in the required-checks set).
    if: >-
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'break-glass')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Prove the gate hooks deny (fail-open regression guard)
        run: bash scripts/test-hooks.sh
