name: tripwires

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      simulate:
        description: 'Tripwire(s) to fire through the real alert path ([DRILL] prefix); "all" fires every wire in one run — used by scripts/drill.sh'
        required: false
        default: ''
  issues:
    types: [labeled]
  push:
    branches: [main]

concurrency:
  group: tripwires
  cancel-in-progress: false

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read
  checks: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_OPS: ${{ secrets.DISCORD_WEBHOOK_OPS }}
          DISCORD_WEBHOOK_FEED: ${{ secrets.DISCORD_WEBHOOK_FEED }}
          DEMO_FREEZE_AT: ${{ vars.DEMO_FREEZE_AT }}
          SIMULATE: ${{ inputs.simulate }}
        with:
          script: |
            const run = require('./scripts/tripwires.js')
            await run({ github, context, core })
