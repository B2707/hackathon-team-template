name: main-ci

# Runs CI on every push to main. Without this, NOTHING ever tests main —
# ci.yml is pull_request-only — so the red-main tripwire watches a branch no
# workflow exercises and a broken squash-merge is invisible until a human
# trips over it. (Audit HIGH.) Kept separate from ci.yml on purpose: its jobs'
# `if:` expressions dereference github.event.pull_request and would fail on
# push events.

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build-test-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build and test main (red-main tripwire sensor; no-op until stack stamped)
        run: |
          if [ ! -f package.json ]; then
            echo "no package.json — no stack yet, pass"
            exit 0
          fi
          npm ci || npm install
          npm run lint --if-present
          npm run typecheck --if-present
          npm run build --if-present
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm test
          else
            echo "no test script — pass"
          fi
