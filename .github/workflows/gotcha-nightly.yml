name: gotcha-nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  distill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Open or refresh the distill issue when candidates exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(find data/context/gotcha-candidates data/context/instinct-candidates -type f -name '*.md' 2>/dev/null || true)
          count=$(printf '%s' "$files" | grep -c . || true)
          if [ "$count" -eq 0 ]; then
            echo "no candidates — nothing to distill"
            exit 0
          fi
          title="Distill: $count candidate(s) awaiting FM promotion"
          body=$(printf 'Nightly distill queue — FM promotes the keepers into data/context/gotchas.md or instincts.md via PR, then deletes the candidate files in the same PR.\n\n%s\n' "$(printf '%s\n' "$files" | sed 's/^/- /')")
          existing=$(gh issue list --label team:triage --search '"Distill:" in:title' --state open --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$title" --body "$body"
            echo "updated distill issue #$existing"
          else
            gh issue create --title "$title" --body "$body" --label team:triage
          fi
