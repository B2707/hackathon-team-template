name: auto-unblock

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  unblock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Unblock ONLY when EVERY blocker is closed. The old single-ref
            // regex unblocked on the FIRST-listed blocker's close ("Blocked-by
            // #10, #11" unblocked when #10 closed with #11 still open) and
            // never matched later-listed ones (audit MEDIUM).
            const closed = context.payload.issue.number;
            const refRe = /blocked[ -]by[^\n#]*((?:#\d+[\s,and]*)+)/gi;
            const extract = (text) => [...String(text || '').matchAll(refRe)]
              .flatMap((m) => [...m[1].matchAll(/#(\d+)/g)].map((x) => Number(x[1])));
            const { data: blocked } = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'blocked', per_page: 100,
            });
            for (const issue of blocked) {
              let refs = extract(issue.body);
              if (!refs.length) {
                const { data: comments } = await github.rest.issues.listComments({
                  ...context.repo, issue_number: issue.number, per_page: 100,
                });
                refs = comments.flatMap((c) => extract(c.body));
              }
              if (!refs.includes(closed)) continue;   // this close isn't one of its blockers
              // every OTHER blocker must be closed too (API error = still open, fail-safe)
              let allClosed = true;
              for (const n of [...new Set(refs)].filter((x) => x !== closed)) {
                let dep;
                try { dep = (await github.rest.issues.get({ ...context.repo, issue_number: n })).data; }
                catch { dep = { state: 'open' }; }
                if (dep.state === 'open') { allClosed = false; break; }
              }
              if (!allClosed) continue;
              await github.rest.issues.removeLabel({
                ...context.repo, issue_number: issue.number, name: 'blocked',
              }).catch(() => {});
              await github.rest.issues.addLabels({
                ...context.repo, issue_number: issue.number, labels: ['ready'],
              });
              await github.rest.issues.createComment({
                ...context.repo, issue_number: issue.number,
                body: `Auto-unblocked: all blocking issues closed (last: #${closed}). Moved to ready — FM re-dispatches.`,
              });
            }
